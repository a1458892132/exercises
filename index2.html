            {"number":65,"question":"使用 Windows 7的备份功能所创建的系统镜像可以保存在()上。","options":{"A":"内存","B":"硬盘","C":"光盘","D":"网络"},"answer":["B","C","D"],"cate":"windows"}
        ];

        // 分类配置
        const cateConfig = {
            all: {name: '全部', color: 'primary'},
            base: {name: '计算机基础', color: 'bg-blue-100 text-blue-700'},
            office: {name: 'Office办公', color: 'bg-purple-100 text-purple-700'},
            network: {name: '网络知识', color: 'bg-green-100 text-green-700'},
            design: {name: '设计软件', color: 'bg-yellow-100 text-yellow-700'},
            windows: {name: 'Windows系统', color: 'bg-red-100 text-red-700'}
        };

        // 全局状态
        const state = {
            userAnswers: {}, // 存储用户答案 {题号: [选中选项]}
            currentCate: 'all',
            showAnswer: true,
            total: questions.length,
            answered: 0,
            correct: 0,
            score: 0
        };

        // DOM元素
        const el = {
            questionsContainer: document.getElementById('questions-container'),
            totalCount: document.getElementById('total-count'),
            answeredCount: document.getElementById('answered-count'),
            correctCount: document.getElementById('correct-count'),
            currentScore: document.getElementById('current-score'),
            progressBar: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-text'),
            toggleAns: document.getElementById('toggle-ans'),
            calcScore: document.getElementById('calc-score'),
            resetAll: document.getElementById('reset-all'),
            categoryTags: document.querySelectorAll('.category-tag'),
            scoreModal: document.getElementById('score-modal'),
            modalContent: document.getElementById('modal-content'),
            modalClose: document.getElementById('modal-close'),
            modalReset: document.getElementById('modal-reset'),
            modalAnswered: document.getElementById('modal-answered'),
            modalCorrect: document.getElementById('modal-correct'),
            modalScore: document.getElementById('modal-score'),
            modalProgress: document.getElementById('modal-progress')
        };

        // 初始化
        function init() {
            renderQuestions();
            bindEvents();
            updateStats();
            el.totalCount.textContent = state.total;
        }

        // 渲染题目
        function renderQuestions() {
            el.questionsContainer.innerHTML = '';
            
            questions.forEach(q => {
                if (state.currentCate !== 'all' && q.cate !== state.currentCate) return;
                
                const isAnswered = !!state.userAnswers[q.number];
                const userAns = state.userAnswers[q.number] || [];
                // 判断是否完全正确（选项数量和内容都一致）
                const isCorrect = isAnswered && JSON.stringify([...userAns].sort()) === JSON.stringify([...q.answer].sort());

                const card = document.createElement('div');
                card.className = `question-card ${isAnswered ? 'question-answered' : ''}`;
                card.dataset.number = q.number;
                card.dataset.cate = q.cate;

                // 生成选项HTML
                let optionsHtml = '';
                for (const [key, val] of Object.entries(q.options)) {
                    const isSelected = userAns.includes(key);
                    const isAnswer = q.answer.includes(key);
                    let optionClass = 'option-unselected';
                    if (isAnswered) {
                        optionClass = isSelected ? (isAnswer ? 'option-correct' : 'option-wrong') : 'option-unselected';
                    }
                    optionsHtml += `
                        <div class="option-btn ${optionClass}" data-q="${q.number}" data-opt="${key}">
                            <span class="w-5 h-5 inline-flex items-center justify-center rounded-full border border-current">
                                ${isSelected ? '<i class="fa fa-check text-xs"></i>' : ''}
                            </span>
                            <span>${key}：${val}</span>
                        </div>
                    `;
                }

                // 标准答案文本
                const answerText = q.answer.join('、');
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-3">
                        <h3 class="text-lg font-semibold text-dark flex items-center gap-2">
                            <span class="inline-flex items-center justify-center w-6 h-6 bg-primary text-white rounded-full text-sm">${q.number}</span>
                            ${q.question}
                        </h3>
                        <span class="category-tag ${cateConfig[q.cate].color}">${cateConfig[q.cate].name}</span>
                    </div>
                    <div class="options-container mb-3">
                        ${optionsHtml}
                    </div>
                    <div class="answer-area ${state.showAnswer ? '' : 'hide-ans'}">
                        <p class="text-sm ${isCorrect ? 'text-success' : isAnswered ? 'text-danger' : 'text-info'}">
                            ${isAnswered 
                                ? (isCorrect ? `✅ 回答正确！标准答案：${answerText}` : `❌ 回答错误！标准答案：${answerText}`) 
                                : '💡 点击选项作答后显示标准答案'}
                        </p>
                    </div>
                `;

                el.questionsContainer.appendChild(card);
            });
        }

        // 更新统计
        function updateStats() {
            state.answered = Object.keys(state.userAnswers).length;
            state.correct = 0;

            // 遍历用户答案，判断正确数
            for (const [qNum, userAns] of Object.entries(state.userAnswers)) {
                const question = questions.find(q => q.number === parseInt(qNum));
                if (JSON.stringify([...userAns].sort()) === JSON.stringify([...question.answer].sort())) {
                    state.correct++;
                }
            }

            state.score = state.correct;
            // 更新DOM
            el.answeredCount.textContent = state.answered;
            el.correctCount.textContent = state.correct;
            el.currentScore.textContent = state.score;
            const progress = state.total > 0 ? (state.answered / state.total) * 100 : 0;
            el.progressBar.style.width = `${progress}%`;
            el.progressText.textContent = `${state.answered}/${state.total}`;
        }

        // 显示得分弹窗
        function showScoreModal() {
            el.modalAnswered.textContent = state.answered;
            el.modalCorrect.textContent = state.correct;
            el.modalScore.textContent = state.score;
            const progress = state.answered > 0 ? (state.correct / state.answered) * 100 : 0;
            el.modalProgress.style.width = `${progress}%`;
            
            el.scoreModal.classList.remove('hidden');
            setTimeout(() => {
                el.modalContent.classList.remove('scale-95', 'opacity-0');
                el.modalContent.classList.add('scale-100', 'opacity-100');
            }, 50);
        }

        // 关闭弹窗
        function closeScoreModal() {
            el.modalContent.classList.remove('scale-100', 'opacity-100');
            el.modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                el.scoreModal.classList.add('hidden');
            }, 300);
        }

        // 重置作答
        function resetAllAnswers() {
            state.userAnswers = {};
            updateStats();
            renderQuestions();
        }

        // 切换答案显隐
        function toggleAnswerShow() {
            state.showAnswer = !state.showAnswer;
            document.querySelectorAll('.answer-area').forEach(area => {
                area.classList.toggle('hide-ans', !state.showAnswer);
            });
            el.toggleAns.innerHTML = state.showAnswer 
                ? '<i class="fa fa-eye-slash"></i> 隐藏答案' 
                : '<i class="fa fa-eye"></i> 显示答案';
        }

        // 绑定事件
        function bindEvents() {
            // 选项点击
            el.questionsContainer.addEventListener('click', (e) => {
                if (e.target.closest('.option-btn')) {
                    const btn = e.target.closest('.option-btn');
                    const qNum = parseInt(btn.dataset.q);
                    const opt = btn.dataset.opt;

                    // 初始化用户答案
                    if (!state.userAnswers[qNum]) state.userAnswers[qNum] = [];
                    const userAns = state.userAnswers[qNum];

                    // 切换选中状态
                    if (userAns.includes(opt)) {
                        state.userAnswers[qNum] = userAns.filter(o => o !== opt);
                    } else {
                        state.userAnswers[qNum].push(opt);
                    }

                    updateStats();
                    renderQuestions();
                }
            });

            // 分类筛选
            el.categoryTags.forEach(tag => {
                tag.addEventListener('click', () => {
                    el.categoryTags.forEach(t => t.classList.remove('category-active'));
                    tag.classList.add('category-active');
                    state.currentCate = tag.dataset.cate;
                    renderQuestions();
                });
            });

            // 切换答案显隐
            el.toggleAns.addEventListener('click', toggleAnswerShow);

            // 计算得分
            el.calcScore.addEventListener('click', () => {
                if (state.answered === 0) {
                    alert('💡 还未作答任何题目，请先选择选项作答！');
                    return;
                }
                showScoreModal();
            });

            // 重新练习
            el.resetAll.addEventListener('click', () => {
                if (confirm('⚠️ 确定要清空所有作答记录，重新开始练习吗？')) {
                    resetAllAnswers();
                }
            });

            // 弹窗关闭
            el.modalClose.addEventListener('click', closeScoreModal);

            // 弹窗重新练习
            el.modalReset.addEventListener('click', () => {
                resetAllAnswers();
                closeScoreModal();
            });

            // 点击弹窗外层关闭
            el.scoreModal.addEventListener('click', (e) => {
                if (e.target === el.scoreModal) closeScoreModal();
            });
        }

        // 页面加载初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
