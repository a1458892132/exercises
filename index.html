    <script>
        const questions = [{"number":1,"question":"1946年，世界上第一台电子计算机（埃尼阿克）在美国宾夕法尼亚大学诞生","answer":"正确"},{"number":2,"question":"计算机软件一般包括系统软件和编辑软件。","answer":"错误"},{"number":3,"question":"开机的正确顺序是先开主机上的电源开关，再打开显示器。","answer":"错误"},{"number":4,"question":"计算机能够直接识别的一种计数制是二进制。","answer":"正确"},{"number":5,"question":"CPU的中文名字叫“中央处理器”，它是计算机的核心。","answer":"正确"},{"number":6,"question":"打印机、显示器、扫描仪都属于输出设备。","answer":"错误"},{"number":7,"question":"硬盘属于内存储器。","answer":"错误"},{"number":8,"question":"计算机中的中央处理器主要由运算器和存储器组成","answer":"错误"},{"number":9,"question":"触摸屏既是输入设备又是输出设备。","answer":"正确"},{"number":10,"question":"盗版软件价钱便宜，青少年是消费者，应该买盗版软件。","answer":"错误"},{"number":11,"question":"微信只能发送文字，不能发图片和语音。","answer":"错误"},{"number":12,"question":"随着技术发展，云盘是现代计算机主机里新增加的一个存储设备。","answer":"错误"},{"number":13,"question":"微信属于一种即时通讯工具。","answer":"正确"},{"number":14,"question":"任何人、任何地方、任何时期都不能未经许可而使用有知识产权的软件。","answer":"正确"},{"number":15,"question":"Word是文字处理系统，只能处理汉字。","answer":"错误"},{"number":16,"question":"Word在页面视图方式中能够看到图文框和使用绘图工具栏的工具绘制图形。","answer":"正确"},{"number":17,"question":"Word中，阿拉伯字号越大，表示字符越小；中文字号越大，表示字符越大。","answer":"错误"},{"number":18,"question":"对文字进行修饰必须先选定相应的文字。","answer":"正确"},{"number":19,"question":"在WODR中，处理艺术字体、数学公式等都不可以像处理图片一样把他们加入图文框，放到文档的任一位置。","answer":"错误"},{"number":20,"question":"在Word 2010中，不可以打开Word 97所生成的文档。","answer":"错误"},{"number":21,"question":"Word中的表格，不可以用公式进行自动计算。","answer":"错误"},{"number":22,"question":"在Word中的查找和替换对话框中的替换和全部替换的作用相同。","answer":"错误"},{"number":23,"question":"关闭文档窗口不会关闭Word主窗口。","answer":"正确"},{"number":24,"question":"在Word文档中一个段落可以使用多种汉字字体和修饰。","answer":"正确"},{"number":25,"question":"在Word2010窗口的工作区中，闪烁的垂直条表示插入点","answer":"正确"},{"number":26,"question":"在Word2010编辑状态下，要选定整个文本的快捷键是CTRL+S","answer":"错误"},{"number":27,"question":"在Word2010文档窗口中，可以同时打开多个文档窗口，被打开的窗口都是活动窗口","answer":"错误"},{"number":28,"question":"在退出Word2010时，如果有工作文档尚未存盘，系统的处理是会弹出要求保存文档的对话框供用户决定保存与否","answer":"正确"},{"number":29,"question":"如果要使Word2010编辑的文档可以用Word2003打开，操作方法是打开“文件”菜单，另存为“word97-2003文档”","answer":"正确"},{"number":30,"question":"Word2010中增强了图片处理功能，可以调整图片的色调、图片颜色的饱和度、亮度对比度、为图片重新着色和删除图片背景等操作","answer":"正确"},{"number":31,"question":"在Word中，格式刷是一个复制格式的工具，用于复制选定对象的格式。","answer":"正确"},{"number":32,"question":"在Word2010文档中，如果要替换文档中的某些内容，可以使用菜单栏中的“编辑→替换”或使用快捷键“Ctrl+H”来完成这个功能。","answer":"正确"},{"number":33,"question":"Excel单元格中数值型数据较大，有时会出现若干个“#”符号，此时只要调列宽就能显示数据。","answer":"正确"},{"number":34,"question":"工作表标签栏位于工作簿窗口的下端，用于显示工作表名。","answer":"正确"},{"number":35,"question":"工作表是构成单元格的最小单位。","answer":"错误"},{"number":36,"question":"如果E2单元格中的数据是85，F2单元格中的数据是91，则在G2单元格中输入=AVERAGE（E2：F2）后，在G2单元格中得到的数据是88。","answer":"正确"},{"number":37,"question":"一个工作簿，无论包括多少个工作表，各表是否有数据，它都将作为一个工作簿文件整体进行存储，而不是只保存有数据的工作表。","answer":"正确"},{"number":38,"question":"在Excel 中，汇总方式只能是求和。","answer":"错误"},{"number":39,"question":"在Excel中，单元格数据填充的方向只有向上填充和向下填充两种。","answer":"错误"},{"number":40,"question":"在Excel操作窗口中，单击工具栏中“合并居中”按钮，各单元格中的数据保存不变。","answer":"错误"},{"number":41,"question":"EXCEL在默认情况下,输入的数字是数值型数据,靠右对齐。","answer":"正确"},{"number":42,"question":"在Excel中，“清除”命令和“删除”命令的功能完全相同","answer":"错误"},{"number":43,"question":"在Excel2010工作表中，若要隐藏列，则必须选定该列相邻右侧一列，单击“开始”选项，选择“格式”、“列”、“隐藏”即可","answer":"错误"},{"number":44,"question":"PowerPoint中，“插入”主选项卡的“影片和声音”中的“文件中的声音”可以直接插入MP3音乐","answer":"正确"},{"number":45,"question":"PowerPoint中裁剪图片是指保存图片的大小不变，而将不希望显示的部分隐藏起来。","answer":"正确"},{"number":46,"question":"PowerPoint中当用户制作完成一份演示文稿后，如果以HTML格式存储，则不可以在Internet上进行发布。","answer":"错误"},{"number":47,"question":"位图是由很多种曲线组成的图像。位图的每个像素点都含有位置和颜色信息。","answer":"错误"},{"number":48,"question":"PowerPoint演示文稿的扩展名为.ppt。","answer":"正确"},{"number":49,"question":"PowerPoint中如果终止幻灯片的放映，可直接按Esc键","answer":"正确"},{"number":50,"question":"PowerPoint中，不应用设计模板，将无法设计幻灯片。","answer":"错误"},{"number":51,"question":"PowerPoint2010是Windows家族中的一员。","answer":"错误"},{"number":52,"question":"设计制作电子演示文稿不是PowerPoint2010的主要功能。","answer":"错误"},{"number":53,"question":"幻灯片浏览视图是进入PowerPoint2010后的默认视图","answer":"错误"},{"number         const cateMap = {1:'computer',2:'computer',3:'computer',4:'computer',5:'computer',6:'computer',7:'computer',8:'computer',9:'computer',10:'computer',11:'network',12:'computer',13:'network',14:'computer',15:'office',16:'office',17:'office',18:'office',19:'office',20:'office',21:'office',22:'office',23:'office',24:'office',25:'office',26:'office',27:'office',28:'office',29:'office',30:'office',31:'office',32:'office',33:'office',34:'office',35:'office',36:'office',37:'office',38:'office',39:'office',40:'office',41:'office',42:'office',43:'office',44:'office',45:'office',46:'office',47:'computer',48:'office',49:'office',50:'office',51:'computer',52:'office',53:'office',54:'office',55:'office',56:'office',57:'office',58:'network',59:'network',60:'network',61:'network',62:'network',63:'network',64:'flash',65:'flash',66:'flash',67:'flash',68:'flash',69:'flash',70:'flash',71:'flash',72:'flash',73:'flash',74:'computer',75:'network',76:'network',77:'network',78:'network',79:'network',80:'network',81:'network',82:'computer',83:'computer',84:'computer',85:'computer',86:'computer',87:'computer',88:'computer',89:'computer',90:'computer',91:'computer',92:'computer',93:'computer',94:'windows',95:'windows',96:'windows',97:'windows',98:'windows',99:'windows',100:'windows',101:'windows',102:'windows',103:'windows',104:'windows',105:'windows'};
        const cateConfig = {all:{name:'全部',color:'primary'},computer:{name:'计算机基础',color:'bg-blue-100 text-blue-700'},office:{name:'Office办公',color:'bg-purple-100 text-purple-700'},network:{name:'网络知识',color:'bg-green-100 text-green-700'},flash:{name:'Flash动画',color:'bg-yellow-100 text-yellow-700'},windows:{name:'Windows系统',color:'bg-red-100 text-red-700'}};
        const state = {userAnswers:{},currentCate:'all',showAnswer:true,total:questions.length,answered:0,correct:0,score:0};
        const el = {questionsContainer:document.getElementById('questions-container'),totalCount:document.getElementById('total-count'),answeredCount:document.getElementById('answered-count'),correctCount:document.getElementById('correct-count'),currentScore:document.getElementById('current-score'),progressBar:document.getElementById('progress-bar'),progressText:document.getElementById('progress-text'),toggleAns:document.getElementById('toggle-ans'),calcScore:document.getElementById('calc-score'),resetAll:document.getElementById('reset-all'),categoryTags:document.querySelectorAll('.category-tag'),scoreModal:document.getElementById('score-modal'),modalContent:document.getElementById('modal-content'),modalClose:document.getElementById('modal-close'),modalReset:document.getElementById('modal-reset'),modalAnswered:document.getElementById('modal-answered'),modalCorrect:document.getElementById('modal-correct'),modalScore:document.getElementById('modal-score'),modalProgress:document.getElementById('modal-progress')};
        function init(){renderQuestions();bindEvents();updateStats();el.totalCount.textContent=state.total;}
        function renderQuestions(){el.questionsContainer.innerHTML='';questions.forEach(q=>{if(state.currentCate!=='all'&&cateMap[q.number]!==state.currentCate)return;const isAnswered=!!state.userAnswers[q.number];const userAns=state.userAnswers[q.number];const isCorrect=isAnswered&&userAns===q.answer;const card=document.createElement('div');card.className=`question-card ${isAnswered?'question-answered':''}`;card.dataset.number=q.number;card.dataset.cate=cateMap[q.number];card.innerHTML=`
                    <div class="flex items-start justify-between mb-3">
                        <h3 class="text-lg font-semibold text-dark flex items-center gap-2">
                            <span class="inline-flex items-center justify-center w-6 h-6 bg-primary text-white rounded-full text-sm">${q.number}</span>
                            ${q.question}
                        </h3>
                        <span class="category-tag ${cateConfig[cateMap[q.number]].color}">${cateConfig[cateMap[q.number]].name}</span>
                    </div>
                    <div class="flex gap-3 mb-3">
                        <div class="option-btn ${getOptionClass(q.number,'正确')}" data-q="${q.number}" data-ans="正确">
                            正确
                        </div>
                        <div class="option-btn ${getOptionClass(q.number,'错误')}" data-q="${q.number}" data-ans="错误">
                            错误
                        </div>
                    </div>
                    <div class="answer-area ${state.showAnswer?'':'hide-ans'}">
                        <p class="text-sm ${isCorrect?'text-success':isAnswered?'text-danger':'text-info'}">
                            ${isAnswered?(isCorrect?'✅ 回答正确！标准答案：'+q.answer:'❌ 回答错误！标准答案：'+q.answer):'💡 点击选项作答后显示标准答案'}
                        </p>
                    </div>
                `;el.questionsContainer.appendChild(card);});}
        function getOptionClass(qNum,ans){if(!state.userAnswers[qNum])return'option-unselected';return state.userAnswers[qNum]===ans?(ans===questions.find(q=>q.number===qNum).answer?'option-correct':'option-wrong'):'option-unselected';}
        function updateStats(){state.answered=Object.keys(state.userAnswers).length;state.correct=Object.values(state.userAnswers).filter((ans,idx)=>{const qNum=Object.keys(state.userAnswers)[idx];return ans===questions.find(q=>q.number===parseInt(qNum)).answer;}).length;state.score=state.correct;el.answeredCount.textContent=state.answered;el.correctCount.textContent=state.correct;el.currentScore.textContent=state.score;const progress=state.total>0?(state.answered/state.total)*100:0;el.progressBar.style.width=`${progress}%`;el.progressText.textContent=`${state.answered}/${state.total}`;}
        function showScoreModal(){el.modalAnswered.textContent=state.answered;el.modalCorrect.textContent=state.correct;el.modalScore.textContent=state.score;const progress=state.answered>0?(state.correct/state.answered)*100:0;el.modalProgress.style.width=`${progress}%`;el.scoreModal.classList.remove('hidden');setTimeout(()=>{el.modalContent.classList.remove('scale-95','opacity-0');el.modalContent.classList.add('scale-100','opacity-100');},50);}
        function closeScoreModal(){el.modalContent.classList.remove('scale-100','opacity-100');el.modalContent.classList.add('scale-95','opacity-0');setTimeout(()=>{el.scoreModal.classList.add('hidden');},300);}
        function resetAllAnswers(){state.userAnswers={};updateStats();renderQuestions();}
        function toggleAnswerShow(){state.showAnswer=!state.showAnswer;const answerAreas=document.querySelectorAll('.answer-area');answerAreas.forEach(area=>{area.classList.toggle('hide-ans',!state.showAnswer);});el.toggleAns.innerHTML=state.showAnswer?'<i class="fa fa-eye-slash"></i> 隐藏答案':'<i class="fa fa-eye"></i> 显示答案';}
        function bindEvents(){el.questionsContainer.addEventListener('click',(e)=>{if(e.target.classList.contains('option-btn')){const qNum=parseInt(e.target.dataset.q);const ans=e.target.dataset.ans;state.userAnswers[qNum]=ans;updateStats();renderQuestions();}});el.categoryTags.forEach(tag=>{tag.addEventListener('click',()=>{el.categoryTags.forEach(t=>t.classList.remove('category-active'));tag.classList.add('category-active');state.currentCate=tag.dataset.cate;renderQuestions();});});el.toggleAns.addEventListener('click',toggleAnswerShow);el.calcScore.addEventListener('click',()=>{if(state.answered===0){alert('💡 还未作答任何题目，请先选择选项作答！');return;}showScoreModal();});el.resetAll.addEventListener('click',()=>{if(confirm('⚠️ 确定要清空所有作答记录，重新开始练习吗？')){resetAllAnswers();}});el.modalClose.addEventListener('click',closeScoreModal);el.modalReset.addEventListener('click',()=>{resetAllAnswers();closeScoreModal();});el.scoreModal.addEventListener('click',(e)=>{if(e.target===el.scoreModal)closeScoreModal();});}
        document.addEventListener('DOMContentLoaded',init);
